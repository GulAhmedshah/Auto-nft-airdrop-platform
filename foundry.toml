[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@erc721a/=lib/ERC721A/contracts/",
    "murky/=lib/murky/src/",
]
fs_permissions = [{ access = "write", path = "./deployments/" }]

[fuzz]
runs = 1000

[fmt]
line_length = 100
tab_width = 4
